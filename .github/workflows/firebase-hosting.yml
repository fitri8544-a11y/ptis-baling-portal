name: Deploy PTIS (FINAL)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Create Service Account File
        run: |
          echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}' > serviceAccount.json

      - name: Set Env
        run: echo "GOOGLE_APPLICATION_CREDENTIALS=serviceAccount.json" >> $GITHUB_ENV

      - name: Deploy to Firebase
        run: firebase deploy --only hosting --project ptiszonkualaketil --non-interactive
